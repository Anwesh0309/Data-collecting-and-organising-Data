<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9"/>
      <stop offset="100%" style="stop-color:#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>
  <!-- Graph paper background -->
  <g stroke="#E8F5E9" stroke-width="1">
    <line x1="0" y1="50" x2="800" y2="50"/>
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>
  <!-- Pictograph title card -->
  <rect x="30" y="15" width="740" height="50" rx="12" fill="#2E7D32" stroke="#1B5E20" stroke-width="2"/>
  <text x="400" y="48" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="22" fill="white">🖼️ PICTOGRAPH — Favourite Fruits in Class 2B</text>
  <!-- Key box -->
  <rect x="30" y="75" width="200" height="36" rx="8" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <text x="40" y="98" font-family="Nunito,sans-serif" font-weight="800" font-size="14" fill="#1B5E20">KEY: 🍎 = 1 student</text>
  <!-- Pictograph table -->
  <rect x="30" y="120" width="740" height="270" rx="10" fill="white" stroke="#4CAF50" stroke-width="2"/>
  <!-- Header row -->
  <rect x="30" y="120" width="740" height="36" rx="10" fill="#A5D6A7"/>
  <text x="130" y="143" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="14" fill="#1B5E20">Fruit</text>
  <text x="450" y="143" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="14" fill="#1B5E20">Number of Students (each icon = 1)</text>
  <text x="730" y="143" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="14" fill="#1B5E20">Total</text>
  <!-- Row dividers -->
  <line x1="220" y1="120" x2="220" y2="390" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="680" y1="120" x2="680" y2="390" stroke="#4CAF50" stroke-width="1.5"/>
  <line x1="30" y1="220" x2="770" y2="220" stroke="#E8F5E9" stroke-width="1.5"/>
  <line x1="30" y1="280" x2="770" y2="280" stroke="#E8F5E9" stroke-width="1.5"/>
  <line x1="30" y1="335" x2="770" y2="335" stroke="#E8F5E9" stroke-width="1.5"/>
  <!-- Row 1: Apples = 9 -->
  <text x="125" y="185" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="18" fill="#333">🍎 Apples</text>
  <text x="230" y="185" font-size="22">🍎🍎🍎🍎🍎🍎🍎🍎🍎</text>
  <text x="725" y="185" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="20" fill="#E65100">9</text>
  <!-- Row 2: Bananas = 6 -->
  <text x="125" y="250" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="18" fill="#333">🍌 Bananas</text>
  <text x="230" y="250" font-size="22">🍌🍌🍌🍌🍌🍌</text>
  <text x="725" y="250" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="20" fill="#E65100">6</text>
  <!-- Row 3: Mangoes = 7 -->
  <text x="125" y="308" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="18" fill="#333">🥭 Mangoes</text>
  <text x="230" y="308" font-size="22">🥭🥭🥭🥭🥭🥭🥭</text>
  <text x="725" y="308" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="20" fill="#E65100">7</text>
  <!-- Row 4: Oranges = 4 -->
  <text x="125" y="365" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="18" fill="#333">🍊 Oranges</text>
  <text x="230" y="365" font-size="22">🍊🍊🍊🍊</text>
  <text x="725" y="365" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="20" fill="#E65100">4</text>
  <!-- Suki pointing at graph -->
  <circle cx="720" cy="80" r="30" fill="#F5C89E" stroke="#E8A855" stroke-width="2"/>
  <ellipse cx="720" cy="52" rx="32" ry="16" fill="#1a1040"/>
  <rect x="698" y="44" width="44" height="12" rx="6" fill="#00B5B2"/>
  <circle cx="711" cy="80" r="4.5" fill="#1a1040"/>
  <circle cx="729" cy="80" r="4.5" fill="#1a1040"/>
  <path d="M711 92 Q720 99 729 92" stroke="#C0603A" stroke-width="2.5" fill="none"/>
  <rect x="696" y="108" width="48" height="44" rx="10" fill="#5B4FCF"/>
  <!-- Arrow pointing to Apples row -->
  <path d="M710 108 L600 160" stroke="#f5c518" stroke-width="3" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f5c518"/>
    </marker>
  </defs>
  <!-- Highlight most popular -->
  <rect x="30" y="156" width="740" height="60" rx="0" fill="rgba(255,214,0,0.12)" stroke="#FFD600" stroke-width="2" stroke-dasharray="5 3"/>
  <!-- Caption -->
  <rect x="0" y="395" width="800" height="55" fill="#1a1040" opacity="0.75"/>
  <text x="400" y="418" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="15" fill="#f5c518">🖼️ Each icon = 1 student! The longer the row, the more popular!</text>
  <text x="400" y="438" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="700" font-size="12" fill="rgba(255,255,255,0.7)">Apples win with 9 votes! 🏆</text>
</svg>
