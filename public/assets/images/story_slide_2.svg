<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#FFF8E1"/>
  <!-- Large notebook -->
  <rect x="60" y="20" width="440" height="390" rx="12" fill="white" stroke="#FFA000" stroke-width="3"/>
  <rect x="60" y="20" width="28" height="390" rx="12" fill="#FFA000"/>
  <!-- Spiral binding dots -->
  <circle cx="74" cy="60" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="110" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="160" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="210" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="260" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="310" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <circle cx="74" cy="360" r="6" fill="white" stroke="#E65100" stroke-width="2"/>
  <!-- Notebook lines -->
  <g stroke="#FFF9C4" stroke-width="1.5">
    <line x1="96" y1="80" x2="488" y2="80"/>
    <line x1="96" y1="110" x2="488" y2="110"/>
    <line x1="96" y1="140" x2="488" y2="140"/>
    <line x1="96" y1="170" x2="488" y2="170"/>
    <line x1="96" y1="200" x2="488" y2="200"/>
    <line x1="96" y1="230" x2="488" y2="230"/>
    <line x1="96" y1="260" x2="488" y2="260"/>
    <line x1="96" y1="290" x2="488" y2="290"/>
    <line x1="96" y1="320" x2="488" y2="320"/>
    <line x1="96" y1="350" x2="488" y2="350"/>
  </g>
  <!-- Title in notebook -->
  <text x="280" y="58" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="18" fill="#E65100">📊 TALLY MARKS — HOW TO COUNT</text>
  <!-- Header row -->
  <rect x="100" y="68" width="380" height="24" rx="4" fill="#FFE082"/>
  <text x="180" y="84" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Number</text>
  <text x="310" y="84" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Tally Mark</text>
  <text x="440" y="84" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Count</text>
  <!-- Tally rows with animated SVG marks -->
  <!-- Row 1: 1 mark -->
  <text x="155" y="105" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="700" font-size="14" fill="#333">One mark</text>
  <line x1="295" y1="92" x2="295" y2="112" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <text x="440" y="105" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="16" fill="#E65100">1</text>
  <!-- Row 2: 4 marks -->
  <text x="155" y="135" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="700" font-size="14" fill="#333">Four marks</text>
  <line x1="285" y1="122" x2="285" y2="142" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="295" y1="122" x2="295" y2="142" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="305" y1="122" x2="305" y2="142" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="315" y1="122" x2="315" y2="142" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <text x="440" y="135" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="16" fill="#E65100">4</text>
  <!-- Row 3: 5 (crossed gate) -->
  <text x="155" y="165" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="700" font-size="14" fill="#333">Five — a gate!</text>
  <line x1="285" y1="152" x2="285" y2="172" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="295" y1="152" x2="295" y2="172" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="305" y1="152" x2="305" y2="172" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="315" y1="152" x2="315" y2="172" stroke="#1565C0" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="278" y1="173" x2="324" y2="151" stroke="#E53935" stroke-width="3.5" stroke-linecap="round"/>
  <text x="440" y="165" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="16" fill="#E65100">5</text>
  <!-- Row 4: 7 marks -->
  <text x="155" y="195" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="700" font-size="14" fill="#333">Gate + 2</text>
  <line x1="280" y1="182" x2="280" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="289" y1="182" x2="289" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="298" y1="182" x2="298" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="307" y1="182" x2="307" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="274" y1="203" x2="314" y2="181" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
  <line x1="322" y1="182" x2="322" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <line x1="331" y1="182" x2="331" y2="202" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  <text x="440" y="195" text-anchor="middle" font-family="IBM Plex Mono,monospace" font-weight="900" font-size="16" fill="#E65100">7</text>
  <!-- Actual tally chart section -->
  <text x="280" y="240" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="16" fill="#E65100">📋 Suki's Drink Survey</text>
  <!-- Table headers -->
  <rect x="100" y="248" width="380" height="22" rx="4" fill="#FFF9C4"/>
  <text x="165" y="263" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Drink</text>
  <text x="300" y="263" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Tally Marks</text>
  <text x="440" y="263" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#E65100">Total</text>
  <!-- Data rows -->
  <text x="115" y="290" font-family="Nunito,sans-serif" font-weight="700" font-size="13" fill="#333">☕ Milo</text>
  <text x="265" y="290" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#1565C0">卌 ||</text>
  <text x="440" y="290" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="16" fill="#E65100">7</text>
  <text x="115" y="315" font-family="Nunito,sans-serif" font-weight="700" font-size="13" fill="#333">🧃 Ribena</text>
  <text x="265" y="315" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#1565C0">卌</text>
  <text x="440" y="315" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="16" fill="#E65100">5</text>
  <text x="115" y="340" font-family="Nunito,sans-serif" font-weight="700" font-size="13" fill="#333">🍵 Pokka Tea</text>
  <text x="265" y="340" font-family="IBM Plex Mono,monospace" font-weight="700" font-size="14" fill="#1565C0">||||</text>
  <text x="440" y="340" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="16" fill="#E65100">4</text>
  <!-- Total row -->
  <rect x="100" y="350" width="380" height="24" rx="4" fill="#FFE082"/>
  <text x="165" y="366" font-family="Nunito,sans-serif" font-weight="900" font-size="13" fill="#E65100">TOTAL</text>
  <text x="440" y="366" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="16" fill="#E65100">16</text>
  <!-- Pencil illustration -->
  <g transform="translate(570,80) rotate(25)">
    <rect x="-8" y="-80" width="16" height="130" rx="3" fill="#FFD54F"/>
    <polygon points="-8,50 8,50 0,70" fill="#FAFAFA"/>
    <rect x="-8" y="-80" width="16" height="16" rx="2" fill="#FF7043"/>
    <rect x="-8" y="-64" width="16" height="6" fill="#FFCC02"/>
    <circle cx="0" cy="70" r="3" fill="#5D4037"/>
  </g>
  <!-- Suki peeking from right side -->
  <circle cx="700" cy="200" r="38" fill="#F5C89E" stroke="#E8A855" stroke-width="2"/>
  <ellipse cx="700" cy="164" rx="40" ry="20" fill="#1a1040"/>
  <rect x="674" y="152" width="52" height="14" rx="7" fill="#00B5B2"/>
  <circle cx="689" cy="200" r="5.5" fill="#1a1040"/>
  <circle cx="711" cy="200" r="5.5" fill="#1a1040"/>
  <circle cx="690" cy="199" r="2" fill="white"/>
  <circle cx="712" cy="199" r="2" fill="white"/>
  <path d="M690 215 Q700 223 710 215" stroke="#C0603A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <circle cx="681" cy="195" r="9" fill="#FFB3A0" opacity="0.5"/>
  <circle cx="719" cy="195" r="9" fill="#FFB3A0" opacity="0.5"/>
  <rect x="672" y="236" width="56" height="55" rx="12" fill="#5B4FCF"/>
  <!-- Thought bubble -->
  <circle cx="745" cy="140" r="5" fill="#FFF9C4" stroke="#E65100" stroke-width="1"/>
  <circle cx="757" cy="128" r="7" fill="#FFF9C4" stroke="#E65100" stroke-width="1"/>
  <ellipse cx="767" cy="114" rx="18" ry="13" fill="#FFF9C4" stroke="#E65100" stroke-width="1.5"/>
  <text x="767" y="118" text-anchor="middle" font-size="14">💡</text>
  <!-- Caption -->
  <rect x="0" y="420" width="800" height="30" fill="#1a1040" opacity="0.7"/>
  <text x="400" y="440" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="14" fill="#f5c518">✏️ Every 5th tally mark crosses the group — making counting super fast!</text>
</svg>
