  <rect x="260" y="68" width="280" height="40" rx="8" fill="#FF6F00"/>
  <text x="400" y="95" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="20" fill="white">🏫 SCHOOL CANTEEN</text>
  <!-- Stalls row -->
  <!-- Stall 1 - Noodles -->
  <rect x="50" y="180" width="140" height="100" rx="6" fill="#FF7043"/>
  <rect x="50" y="180" width="140" height="28" rx="6" fill="#E53935"/>
  <text x="120" y="200" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="13" fill="white">🍜 NOODLES</text>
  <rect x="60" y="215" width="120" height="60" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="120" y="252" text-anchor="middle" font-size="32">🍜</text>
  <!-- Stall 2 - Drinks -->
  <rect x="210" y="180" width="140" height="100" rx="6" fill="#42A5F5"/>
  <rect x="210" y="180" width="140" height="28" rx="6" fill="#1E88E5"/>
