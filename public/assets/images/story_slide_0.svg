  <rect x="380" y="215" width="120" height="60" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="440" y="252" text-anchor="middle" font-size="32">🍚</text>
  <!-- Stall 4 - Snacks -->
  <rect x="530" y="180" width="140" height="100" rx="6" fill="#AB47BC"/>
  <rect x="530" y="180" width="140" height="28" rx="6" fill="#8E24AA"/>
  <text x="600" y="200" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="13" fill="white">🍡 SNACKS</text>
  <rect x="540" y="215" width="120" height="60" rx="4" fill="rgba(255,255,255,0.2)"/>
