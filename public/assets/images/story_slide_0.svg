  <!-- Counter / Floor tiles -->
  <rect x="30" y="280" width="740" height="18" rx="4" fill="#F5F5F5" stroke="#E0E0E0" stroke-width="1"/>
  <g fill="none" stroke="#E0E0E0" stroke-width="1">
    <line x1="130" y1="280" x2="130" y2="298"/>
    <line x1="230" y1="280" x2="230" y2="298"/>
    <line x1="330" y1="280" x2="330" y2="298"/>
    <line x1="430" y1="280" x2="430" y2="298"/>
    <line x1="530" y1="280" x2="530" y2="298"/>
    <line x1="630" y1="280" x2="630" y2="298"/>
  </g>
  <!-- Students at canteen -->
  <!-- Suki (main character) -->
  <circle cx="290" cy="345" r="28" fill="#F5C89E" stroke="#E8A855" stroke-width="2"/>
  <ellipse cx="290" cy="318" rx="30" ry="16" fill="#1a1040"/>
  <circle cx="281" cy="344" r="4.5" fill="#1a1040"/>
  <circle cx="299" cy="344" r="4.5" fill="#1a1040"/>
  <circle cx="282" cy="343" r="1.5" fill="white"/>
  <circle cx="300" cy="343" r="1.5" fill="white"/>
