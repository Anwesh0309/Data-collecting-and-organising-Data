  <rect x="220" y="215" width="120" height="60" rx="4" fill="rgba(255,255,255,0.2)"/>
  <text x="280" y="252" text-anchor="middle" font-size="32">🥤</text>
  <!-- Stall 3 - Rice -->
  <rect x="370" y="180" width="140" height="100" rx="6" fill="#66BB6A"/>
  <rect x="370" y="180" width="140" height="28" rx="6" fill="#43A047"/>
