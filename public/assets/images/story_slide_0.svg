  <circle cx="330" cy="360" r="14" fill="none" stroke="#f5c518" stroke-width="3.5"/>
  <line x1="340" y1="370" x2="350" y2="380" stroke="#f5c518" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Student 2 -->
  <circle cx="430" cy="345" r="22" fill="#FFDAB9" stroke="#E8A855" stroke-width="1.5"/>
  <ellipse cx="430" cy="323" rx="24" ry="12" fill="#3E2723"/>
  <circle cx="422" cy="344" r="3.5" fill="#1a1040"/>
  <circle cx="438" cy="344" r="3.5" fill="#1a1040"/>
  <path d="M423 355 Q430 361 437 355" stroke="#C0603A" stroke-width="2" fill="none"/>
  <rect x="409" y="365" width="42" height="30" rx="8" fill="#FF7043"/>
  <!-- Student 3 -->
  <circle cx="530" cy="345" r="22" fill="#F5C89E" stroke="#E8A855" stroke-width="1.5"/>
  <ellipse cx="530" cy="323" rx="24" ry="12" fill="#212121"/>
  <circle cx="522" cy="344" r="3.5" fill="#1a1040"/>
  <circle cx="538" cy="344" r="3.5" fill="#1a1040"/>
  <path d="M523 355 Q530 361 537 355" stroke="#C0603A" stroke-width="2" fill="none"/>
  <rect x="509" y="365" width="42" height="30" rx="8" fill="#42A5F5"/>
  <!-- Speech bubbles -->
  <rect x="340" y="295" width="130" height="40" rx="10" fill="white" stroke="#f5c518" stroke-width="2"/>
  <path d="M355 335 L345 348 L368 335" fill="white" stroke="#f5c518" stroke-width="2"/>
  <text x="405" y="320" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#1a1040">Which drink is</text>
  <text x="405" y="334" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="800" font-size="12" fill="#1a1040">most popular? 🤔</text>
  <!-- Floor tiles pattern -->
  <g fill="none" stroke="#E0E0E0" stroke-width="1" opacity="0.5">
    <rect x="0" y="300" width="100" height="50" fill="#FFF9C4"/>
    <rect x="100" y="300" width="100" height="50" fill="#FFF3A3"/>
    <rect x="200" y="300" width="100" height="50" fill="#FFF9C4"/>
    <rect x="300" y="300" width="100" height="50" fill="#FFF3A3"/>
    <rect x="400" y="300" width="100" height="50" fill="#FFF9C4"/>
    <rect x="500" y="300" width="100" height="50" fill="#FFF3A3"/>
    <rect x="600" y="300" width="100" height="50" fill="#FFF9C4"/>
    <rect x="700" y="300" width="100" height="50" fill="#FFF3A3"/>
  </g>
  <!-- Title label -->
  <rect x="0" y="420" width="800" height="30" fill="#1a1040" opacity="0.7"/>
  <text x="400" y="440" text-anchor="middle" font-family="Nunito,sans-serif" font-weight="900" font-size="14" fill="#f5c518">📍 Singapore School Canteen — Suki begins her data journey!</text>
</svg>
