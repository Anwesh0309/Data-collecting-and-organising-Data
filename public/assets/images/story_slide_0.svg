<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="sky0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB"/>
      <stop offset="100%" style="stop-color:#E0F4FF"/>
    </linearGradient>
    <linearGradient id="floor0" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF9C4"/>
      <stop offset="100%" style="stop-color:#FFF3A3"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="800" height="450" fill="url(#sky0)"/>
  <!-- Sun -->
  <circle cx="700" cy="70" r="45" fill="#FFD700" opacity="0.9"/>
  <circle cx="700" cy="70" r="38" fill="#FFC200"/>
  <!-- Sun rays -->
  <g stroke="#FFD700" stroke-width="4" stroke-linecap="round">
    <line x1="700" y1="15" x2="700" y2="5"/>
    <line x1="700" y1="125" x2="700" y2="135"/>
    <line x1="645" y1="70" x2="635" y2="70"/>
    <line x1="755" y1="70" x2="765" y2="70"/>
    <line x1="661" y1="31" x2="654" y2="24"/>
    <line x1="739" y1="109" x2="746" y2="116"/>
    <line x1="739" y1="31" x2="746" y2="24"/>
    <line x1="661" y1="109" x2="654" y2="116"/>
  </g>
  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="80" ry="35" fill="white" opacity="0.85"/>
  <ellipse cx="200" cy="65" rx="60" ry="28" fill="white" opacity="0.9"/>
  <ellipse cx="100" cy="75" rx="50" ry="22" fill="white" opacity="0.8"/>
  <ellipse cx="500" cy="55" rx="70" ry="28" fill="white" opacity="0.75"/>
  <ellipse cx="550" cy="42" rx="55" ry="22" fill="white" opacity="0.8"/>
  <!-- Ground / floor -->
